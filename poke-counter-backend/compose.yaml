# Development database for poke-counter-backend.
# Spring Boot (spring-boot-docker-compose) auto-configures the datasource from this service.
services:
  postgres:
    image: postgres:16-alpine
    container_name: poke-counter-postgres
    environment:
      POSTGRES_DB: poke_counter
      POSTGRES_USER: poke_counter
      POSTGRES_PASSWORD: poke_counter_dev
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poke_counter -d poke_counter"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
