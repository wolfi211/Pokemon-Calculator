spring:
  application:
    name: poke-counter-backend
  jpa:
    properties:
      hibernate:
        globally_quoted_identifiers: true

poke-api:
  base-url: https://pokeapi.co/api/v2
  # Minimum delay between consecutive requests (ms). 0 = no delay. Keeps sync under PokeAPI limits.
  min-delay-between-requests-ms: 100
